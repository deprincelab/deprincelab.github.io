<!DOCTYPE html>
<html lang="en">
  {% include head.html %}
  <body>

    {% if page.math %}
      <!--<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>-->
      <!--<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>-->
      
      <script>
        window.MathJax = {
          tex: {
            inlineMath: [['$', '$'], ['\\(', '\\)']],
            displayMath: [['$$', '$$'], ['\\[', '\\]']],
            processEscapes: true,
            // 2. Add this to ensure Jupyter's 'align' environments work
            tags: 'ams' 
          },
          options: {
            enableMenu: false
          }
        };
      </script>
      
      <script type="text/javascript" id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
      </script>
    {% endif %}

    <a class="skip-link" href="#main-content">Skip to main content</a>

    <nav role="navigation" aria-label="Sidebar Menu">
      {% include sidebar.html %}
    </nav>

    <div class="wrapper">
      <header role="banner" class="masthead">
        <div class="container">
          {% include header.html %}
        </div>
      </header>

      <main role="main" id="main-content" class="container content">
        {{ content }}
      </main>

      <footer role="contentinfo" class="footer">
        <div class="container">
          {% include footer.html %}
        </div>
      </footer>
    </div>

    <label for="sidebar-checkbox" class="sidebar-toggle"></label>

    <script>
      (function(document) {
        var toggle = document.querySelector('.sidebar-toggle');
        var sidebar = document.querySelector('#sidebar');
        var checkbox = document.querySelector('#sidebar-checkbox');

        document.addEventListener('click', function(e) {
          var target = e.target;

          if(!checkbox.checked ||
             sidebar.contains(target) ||
             (target === checkbox || target === toggle)) return;

          checkbox.checked = false;
        }, false);
      })(document);
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", function() {
        // CODE SNIPPETS
        // 1. Find all pre tags generated by Jupyter
        var preBlocks = document.querySelectorAll('pre');
        
        preBlocks.forEach(function(block) {
          // 2. Add the 'code' role so screen readers know what it is
          block.setAttribute('role', 'region');
          block.setAttribute('aria-label', 'Code snippet or calculation input');
          
          // 3. Make it focusable (Required for ADA if the code scrolls horizontally)
          if (block.scrollWidth > block.clientWidth) {
            block.setAttribute('tabindex', '0');
          }
    
          // 4. If there's no <code> tag inside, wrap the inner content
          if (!block.querySelector('code')) {
            block.innerHTML = '<code>' + block.innerHTML + '</code>';
          }
        });
      });
    </script>

  </body>
</html>
