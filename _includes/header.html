<header class="masthead">
  <h2 class="masthead-title">
    <center>
      <a href="{{ site.baseurl }}/">
        {% if site.logo %}
          <img src="{{ site.logo | relative_url }}" alt="{{ site.title }}" style="width: 75%;" alt="DePrince group logo">
        {% else %}
          {{ site.title }}
        {% endif %}
      </a>
    </center>
  </h2>
  {% if site.tagline %}
    <h5 class="masthead-tagline">{{ site.tagline }}</h5>
  {% endif %}
</header>

<style>
  /* 1. MAIN CONTENT LINKS (Garnet) */
  .post-content a, 
  .page-content a, 
  article a,
  #main a {
    color: #78243C !important;
    text-decoration: none;
  }

  .post-content a:hover, 
  article a:hover {
    color: #84754E !important;
    text-decoration: underline;
  }

  /* 2. SIDEBAR LINKS (Force back to White) */
  /* We target the common Tao theme sidebar classes */
  .sidebar a, 
  .side-nav a, 
  .navigation a,
  .site-nav a {
    color: #ffffff !important; 
    text-decoration: none;
  }

  .sidebar a:hover, 
  .site-nav a:hover {
    color: #ceb888 !important; /* Optional: FSU Gold hover for the sidebar */
  }
</style>
